{% extends "base.html" %}
{% block content %}


<!-- trang upload -->
<h2>Upload tài liệu</h2>
<form method="post" enctype="multipart/form-data">
    <input type="text" name="title" placeholder="Tiêu đề" required><br> <!-- phần tiêu đề tài liệu -->
    <textarea name="description" placeholder="Mô tả"></textarea><br> <!-- phần mô tả tài liệu -->
    <input type="file" name="file" required><br> <!-- phần chọn file để upload -->
    <button type="submit">Upload</button>
</form>
{% endblock %}
