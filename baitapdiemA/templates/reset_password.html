{% extends "base.html" %}
{% block content %}


<!-- trang reset mật khẩu cho user -->
<h2>Reset mật khẩu cho {{ user.username }}</h2>
<form method="post">
    <input type="password" name="new_password" placeholder="Mật khẩu mới" required><br>
    <button type="submit">Đặt lại mật khẩu</button>
</form>
<a href="{{ url_for('admin') }}">Quay lại trang admin</a> <!-- link để quay lại trang admin -->
{% endblock %}
